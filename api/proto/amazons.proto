syntax = "proto3";

package amazons;

option go_package = "github.com/marcel-zisser/amazons-game-server/api/proto/gen;gen";

service GameService {
  rpc PlayGame (PlayGameRequest) returns (stream GameEvent);
  rpc SubmitMove (MoveRequest) returns (MoveResponse);
  rpc Echo(EchoRequest) returns (EchoResponse);
}

message PlayGameRequest {
  string bot_name = 1;
}

message GameEvent {

  enum EventType {
    MATCH_FOUND = 0;
    YOUR_TURN = 1;
    OPPONENT_MOVED = 2;
    GAME_OVER = 3;
  }

  EventType type = 1;
  string match_id = 2;
  string opponent_name = 3;
  
  // Game State
  enum PlayerColor {
    PLAYER_UNKNOWN = 0; // Protobuf REQUIRES the first value to be 0
    PLAYER_WHITE = 1;
    PLAYER_BLACK = 2;
  }

  enum FieldState {
    FIELD_EMPTY = 0;
    FIELD_WHITE_AMAZON = 1;
    FIELD_BLACK_AMAZON = 2;
    FIELD_ARROW = 3;
  }

  repeated FieldState board_state = 4;
  PlayerColor current_player = 5;
  string winner_name = 6;
  string error_message = 7;
}

message Position {
  int32 row = 1;
  int32 col = 2;
}

message MoveRequest {
  string match_id = 1;
  Position from_pos = 2;
  Position to_pos = 3;
  Position arrow_pos = 4;
}

message MoveResponse {
  bool success = 1;
  string error_message = 2;
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}
